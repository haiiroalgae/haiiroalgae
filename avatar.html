<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>皮套 - Avatar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #f7b05e;
      --bg-white: #ffffff;
      --bg-gray: #f5f5f5;
      --text-dark: #333333;
      --text-gray: #666666;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-white);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* 返回按钮 */
    .back-btn {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 100;
    }

    .back-btn a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: var(--bg-white);
      border-radius: 25px;
      text-decoration: none;
      color: var(--text-dark);
      font-size: 0.9rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .back-btn a:hover {
      background: var(--primary-color);
      color: var(--bg-white);
    }

    /* 主容器 */
    .avatar-container {
      display: flex;
      min-height: 100vh;
      padding: 2rem;
      gap: 2rem;
    }

    /* 左侧气泡按钮区域 */
    .bubble-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.5rem;
      padding: 4rem 2rem;
      position: relative;
    }

    .bubble-btn {
      padding: 1.25rem 2rem;
      background: var(--bg-gray);
      border-radius: 50px;
      text-decoration: none;
      color: var(--text-dark);
      font-size: 1.1rem;
      font-weight: 500;
      text-align: center;
      transition: all 0.3s ease;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      max-width: 280px;
    }

    .bubble-btn:nth-child(1) { align-self: flex-start; }
    .bubble-btn:nth-child(2) { align-self: center; margin-top: 2rem; }
    .bubble-btn:nth-child(3) { align-self: flex-end; }
    .bubble-btn:nth-child(4) { align-self: center; }
    .bubble-btn:nth-child(5) { align-self: flex-start; }

    .bubble-btn:hover {
      background: var(--primary-color);
      color: var(--bg-white);
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(247, 176, 94, 0.4);
    }

    /* 右侧立绘 */
    .avatar-display {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .avatar-display img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }

    /* 响应式 */
    @media (max-width: 900px) {
      .avatar-container {
        flex-direction: column-reverse;
      }

      .avatar-display {
        padding: 1rem;
      }

      .avatar-display img {
        max-height: 50vh;
      }

      .bubble-area {
        padding: 2rem 1rem;
        gap: 1rem;
      }

      .bubble-btn {
        max-width: 100%;
        font-size: 1rem;
        padding: 1rem 1.5rem;
      }

      .bubble-btn:nth-child(1),
      .bubble-btn:nth-child(2),
      .bubble-btn:nth-child(3),
      .bubble-btn:nth-child(4),
      .bubble-btn:nth-child(5) {
        align-self: center;
        margin-top: 0;
      }

      .back-btn {
        top: 1rem;
        left: 1rem;
      }

      .back-btn a {
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <!-- 返回按钮 -->
  <div class="back-btn">
    <a href="index.html">← 返回首页</a>
  </div>

  <div class="avatar-container">
    <!-- 左侧气泡按钮 -->
    <div class="bubble-area">
      <a class="bubble-btn" href="https://space.bilibili.com/" target="_blank">直播站点</a>
      <a class="bubble-btn" href="fanart.html">二创相关</a>
      <a class="bubble-btn" href="#">待开放</a>
      <a class="bubble-btn" href="#">待开放</a>
      <a class="bubble-btn" href="#">待开放</a>
    </div>

    <!-- 右侧立绘 -->
    <div class="avatar-display">
      <img src="images/avatar.png" alt="皮套立绘">
    </div>
  </div>
</body>
</html>
