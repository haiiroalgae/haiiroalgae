<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人动态 - Blog</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #f7b05e;
      --bg-white: #ffffff;
      --bg-gray: #f5f5f5;
      --text-dark: #333333;
      --text-gray: #666666;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-white);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* 返回按钮 */
    .back-btn {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 100;
    }

    .back-btn a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: var(--bg-white);
      border-radius: 25px;
      text-decoration: none;
      color: var(--text-dark);
      font-size: 0.9rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .back-btn a:hover {
      background: var(--primary-color);
      color: var(--bg-white);
    }

    /* 页面标题 */
    .page-title {
      text-align: center;
      padding: 5rem 1rem 2rem;
      font-size: 1.75rem;
      color: var(--text-dark);
    }

    /* 动态卡片容器 */
    .blog-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem;
    }

    .blog-card {
      background: var(--bg-white);
      border: 1px solid var(--bg-gray);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
      transition: box-shadow 0.3s ease;
      position: relative;
    }

    .blog-card:hover {
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    }

    /* 置顶标识 */
    .blog-card.pinned {
      border: 2px solid var(--primary-color);
    }

    .blog-card.pinned::before {
      content: '置顶';
      position: absolute;
      top: -1px;
      right: 1rem;
      background: var(--primary-color);
      color: white;
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      border-radius: 0 0 8px 8px;
    }

    .blog-time {
      font-size: 0.85rem;
      color: var(--text-gray);
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--bg-gray);
    }

    .blog-content {
      font-size: 1rem;
      line-height: 1.7;
      color: var(--text-dark);
      margin-bottom: 1rem;
    }

    /* 图片网格 */
    .blog-images {
      display: grid;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .blog-images.grid-1 {
      grid-template-columns: 1fr;
    }

    .blog-images.grid-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .blog-images.grid-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    .blog-images.grid-4 {
      grid-template-columns: repeat(2, 1fr);
    }

    .blog-images.grid-3 img,
    .blog-images.grid-4 img {
      height: 180px;
    }

    .blog-images img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .blog-images img:hover {
      transform: scale(1.02);
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-gray);
    }

    /* 模态框 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal.active {
      display: flex;
    }

    .modal img {
      max-width: 90%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 8px;
    }

    .modal-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      font-size: 2rem;
      color: white;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      transition: background 0.3s ease;
    }

    .modal-close:hover {
      background: var(--primary-color);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .blog-container {
        padding: 1rem;
      }

      .blog-card {
        padding: 1rem;
        margin-bottom: 1rem;
      }

      .page-title {
        padding: 4rem 1rem 1rem;
        font-size: 1.5rem;
      }

      .blog-images img {
        height: 150px;
      }

      .back-btn {
        top: 1rem;
        left: 1rem;
      }
    }
  </style>
</head>
<body oncontextmenu="return false">
  <!-- 返回按钮 -->
  <div class="back-btn">
    <a href="index.html">← 返回首页</a>
  </div>

  <h1 class="page-title">个人动态</h1>

  <div class="blog-container" id="blogContainer">
    <div class="loading">加载中...</div>
  </div>

  <!-- 图片预览模态框 -->
  <div class="modal" id="modal">
    <span class="modal-close" id="modalClose">×</span>
    <img id="modalImg" src="" alt="大图预览">
  </div>

  <script>
    // 加载博客数据
    async function loadPosts() {
      try {
        const response = await fetch('data/posts.json');
        const data = await response.json();
        renderPosts(data);
      } catch (error) {
        console.error('加载失败:', error);
        document.getElementById('blogContainer').innerHTML = '<div class="loading">加载失败</div>';
      }
    }

    // 渲染动态
    function renderPosts(posts) {
      const container = document.getElementById('blogContainer');
      container.innerHTML = '';

      // 置顶排序：置顶文章在前，其他按时间倒序
      const sortedPosts = [...posts].sort((a, b) => {
        if (a.isPinned && !b.isPinned) return -1;
        if (!a.isPinned && b.isPinned) return 1;
        return new Date(b.createdAt) - new Date(a.createdAt);
      });

      sortedPosts.forEach(post => {
        const card = document.createElement('div');
        card.className = 'blog-card' + (post.isPinned ? ' pinned' : '');

        // 多图网格布局支持
        let imagesHtml = '';
        if (post.images && post.images.length > 0) {
          const count = post.images.length;
          let gridClass = 'grid-1';
          if (count === 2) gridClass = 'grid-2';
          else if (count === 3) gridClass = 'grid-3';
          else if (count >= 4) gridClass = 'grid-4';
          
          const imagesList = post.images.map(img =>
            `<img src="${img}" alt="动态图片">`
          ).join('');
          imagesHtml = `<div class="blog-images ${gridClass}">${imagesList}</div>`;
        }

        card.innerHTML = `
          <div class="blog-time">${post.createdAt}</div>
          <div class="blog-content">${post.content}</div>
          ${imagesHtml}
        `;

        // 添加图片点击事件
        card.querySelectorAll('.blog-images img').forEach(img => {
          img.addEventListener('click', () => openModal(img.src));
        });

        container.appendChild(card);
      });
    }

    // 打开模态框
    function openModal(src) {
      const modal = document.getElementById('modal');
      const modalImg = document.getElementById('modalImg');
      modalImg.src = src;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // 关闭模态框
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.body.style.overflow = '';
    }

    // 禁用右键保存
    document.addEventListener('contextmenu', e => {
      if (e.target.tagName === 'IMG') {
        e.preventDefault();
      }
    });

    // 初始化
    loadPosts();
  </script>
</body>
</html>
