<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设定展示 - Character</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #f7b05e;
      --bg-white: #ffffff;
      --bg-gray: #f5f5f5;
      --text-dark: #333333;
      --text-gray: #666666;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-white);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* 返回按钮 */
    .back-btn {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 100;
    }

    .back-btn a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: var(--bg-white);
      border-radius: 25px;
      text-decoration: none;
      color: var(--text-dark);
      font-size: 0.9rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .back-btn a:hover {
      background: var(--primary-color);
      color: var(--bg-white);
    }

    /* 页面标题 */
    .page-title {
      text-align: center;
      padding: 5rem 1rem 2rem;
      font-size: 1.75rem;
      color: var(--text-dark);
    }

    /* 角色图鉴网格 */
    .character-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      max-width: 1000px;
      margin: 0 auto;
    }

    .character-btn {
      width: 120px;
      height: 140px;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
      border: 3px solid transparent;
      background: var(--bg-gray);
    }

    .character-btn:hover {
      transform: translateY(-8px) scale(1.05);
      border-color: var(--primary-color);
      box-shadow: 0 12px 32px rgba(247, 176, 94, 0.3);
    }

    .character-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-gray);
    }

    /* 模态框 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-white);
      border-radius: 20px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      animation: modalIn 0.3s ease;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 1.5rem;
      color: var(--text-gray);
      cursor: pointer;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-gray);
      border-radius: 50%;
      transition: all 0.3s ease;
      z-index: 10;
    }

    .modal-close:hover {
      background: var(--primary-color);
      color: var(--bg-white);
    }

    .modal-image {
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      border-radius: 20px 20px 0 0;
    }

    .modal-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-info {
      padding: 1.5rem;
    }

    .modal-info h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      color: var(--primary-color);
    }

    .modal-info p {
      margin-bottom: 0.75rem;
      color: var(--text-gray);
      font-size: 0.95rem;
    }

    .modal-info a {
      color: var(--primary-color);
      text-decoration: none;
    }

    .modal-info a:hover {
      text-decoration: underline;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .character-grid {
        gap: 1rem;
        padding: 1rem;
      }

      .character-btn {
        width: 100px;
        height: 120px;
      }

      .page-title {
        padding: 4rem 1rem 1rem;
        font-size: 1.5rem;
      }

      .modal-content {
        max-width: 90%;
      }

      .back-btn {
        top: 1rem;
        left: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- 返回按钮 -->
  <div class="back-btn">
    <a href="index.html">← 返回首页</a>
  </div>

  <h1 class="page-title">设定展示</h1>

  <div class="character-grid" id="characterGrid">
    <div class="loading">加载中...</div>
  </div>

  <!-- 角色详情模态框 -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="modal-close" id="modalClose">×</span>
      <div class="modal-image">
        <img id="modalImg" src="" alt="角色详情">
      </div>
      <div class="modal-info">
        <h2 id="modalName"></h2>
        <p><strong>站点链接：</strong><a id="modalSite" href="#" target="_blank"></a></p>
        <p><strong>联系方式：</strong><span id="modalContact"></span></p>
      </div>
    </div>
  </div>

  <script>
    // 加载角色数据
    async function loadCharacters() {
      try {
        const response = await fetch('data/characters.json');
        const data = await response.json();
        renderCharacters(data);
      } catch (error) {
        console.error('加载失败:', error);
        document.getElementById('characterGrid').innerHTML = '<div class="loading">加载失败</div>';
      }
    }

    // 渲染角色按钮
    function renderCharacters(characters) {
      const grid = document.getElementById('characterGrid');
      grid.innerHTML = '';

      characters.forEach((char, index) => {
        const btn = document.createElement('div');
        btn.className = 'character-btn';
        btn.innerHTML = `<img src="${char.thumbnailUrl}" alt="${char.name}">`;
        btn.addEventListener('click', () => openModal(char));
        grid.appendChild(btn);
      });
    }

    // 打开模态框
    function openModal(char) {
      document.getElementById('modalImg').src = char.detailUrl;
      document.getElementById('modalName').textContent = char.name;
      document.getElementById('modalSite').textContent = char.detailInfo.site;
      document.getElementById('modalSite').href = char.detailInfo.site;
      document.getElementById('modalContact').textContent = char.detailInfo.contact;

      document.getElementById('modal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // 关闭模态框
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.body.style.overflow = '';
    }

    // 初始化
    loadCharacters();
  </script>
</body>
</html>
