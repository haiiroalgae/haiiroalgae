<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设定展示 - Character</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #f7b05e;
      --bg-white: #ffffff;
      --bg-gray: #f5f5f5;
      --text-dark: #333333;
      --text-gray: #666666;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-white);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* 返回按钮 */
    .back-btn {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 100;
    }

    .back-btn a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.25rem;
      background: var(--bg-white);
      border-radius: 25px;
      text-decoration: none;
      color: var(--text-dark);
      font-size: 0.9rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      transition: all 0.3s ease;
    }

    .back-btn a:hover {
      background: var(--primary-color);
      color: var(--bg-white);
    }

    /* 页面标题 */
    .page-title {
      text-align: center;
      padding: 5rem 1rem 2rem;
      font-size: 1.75rem;
      color: var(--text-dark);
    }

    /* 角色图鉴网格 - 无边框 */
    .character-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .character-btn {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      background: transparent;
    }

    .character-btn:hover {
      transform: scale(1.1);
    }

    .character-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-gray);
    }

    /* 模态框 - 三图滑动 */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      position: relative;
      max-width: 900px;
      width: 100%;
      animation: modalIn 0.3s ease;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .modal-close {
      position: absolute;
      top: -3rem;
      right: 0;
      font-size: 2rem;
      color: white;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      transition: background 0.3s ease;
      z-index: 10;
    }

    .modal-close:hover {
      background: var(--primary-color);
    }

    /* 三图滑动图集 */
    .slider-container {
      position: relative;
      width: 100%;
      overflow: hidden;
      border-radius: 12px;
    }

    .slider-wrapper {
      display: flex;
      transition: transform 0.5s ease;
    }

    .slider-slide {
      min-width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider-slide img {
      max-width: 100%;
      max-height: 70vh;
      object-fit: contain;
    }

    /* 滑动按钮 */
    .slider-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 50px;
      height: 50px;
      background: rgba(255, 255, 255, 0.3);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
      transition: background 0.3s ease;
      z-index: 5;
    }

    .slider-btn:hover {
      background: var(--primary-color);
    }

    .slider-btn.prev { left: 1rem; }
    .slider-btn.next { right: 1rem; }

    /* 指示器 */
    .slider-dots {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .slider-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .slider-dot.active {
      background: var(--primary-color);
    }

    /* 角色信息 */
    .modal-info {
      text-align: center;
      padding: 1.5rem;
      color: white;
    }

    .modal-info h2 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
      color: var(--primary-color);
    }

    .modal-info p {
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }

    .modal-info a {
      color: var(--primary-color);
      text-decoration: none;
    }

    .modal-info a:hover {
      text-decoration: underline;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .character-grid {
        gap: 0.75rem;
        padding: 1rem;
      }

      .character-btn {
        width: 70px;
        height: 70px;
      }

      .page-title {
        padding: 4rem 1rem 1rem;
        font-size: 1.5rem;
      }

      .modal {
        padding: 1rem;
      }

      .slider-btn {
        width: 40px;
        height: 40px;
        font-size: 1.2rem;
      }

      .back-btn {
        top: 1rem;
        left: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- 返回按钮 -->
  <div class="back-btn">
    <a href="index.html">← 返回首页</a>
  </div>

  <h1 class="page-title">角色图鉴</h1>

  <div class="character-grid" id="characterGrid">
    <div class="loading">加载中...</div>
  </div>

  <!-- 角色详情模态框 -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <span class="modal-close" id="modalClose">×</span>
      
      <!-- 三图滑动 -->
      <div class="slider-container">
        <button class="slider-btn prev" id="prevBtn">‹</button>
        <div class="slider-wrapper" id="sliderWrapper"></div>
        <button class="slider-btn next" id="nextBtn">›</button>
      </div>
      <div class="slider-dots" id="sliderDots"></div>

      <div class="modal-info">
        <h2 id="modalName"></h2>
        <p><strong>站点链接：</strong><a id="modalSite" href="#" target="_blank"></a></p>
        <p><strong>联系方式：</strong><span id="modalContact"></span></p>
      </div>
    </div>
  </div>

  <script>
    let currentSlide = 0;
    let totalSlides = 0;
    let currentCharacter = null;

    // 加载角色数据
    async function loadCharacters() {
      try {
        const response = await fetch('data/characters.json');
        const data = await response.json();
        renderCharacters(data);
      } catch (error) {
        console.error('加载失败:', error);
        document.getElementById('characterGrid').innerHTML = '<div class="loading">加载失败</div>';
      }
    }

    // 渲染角色按钮 - 无边框PNG
    function renderCharacters(characters) {
      const grid = document.getElementById('characterGrid');
      grid.innerHTML = '';

      characters.forEach((char, index) => {
        const btn = document.createElement('div');
        btn.className = 'character-btn';
        btn.innerHTML = `<img src="${char.thumbnailUrl}" alt="${char.name}">`;
        btn.addEventListener('click', () => openModal(char));
        grid.appendChild(btn);
      });
    }

    // 打开模态框
    function openModal(char) {
      currentCharacter = char;
      currentSlide = 0;
      
      // 渲染滑动图集
      const wrapper = document.getElementById('sliderWrapper');
      const dots = document.getElementById('sliderDots');
      
      wrapper.innerHTML = '';
      dots.innerHTML = '';
      
      totalSlides = char.detailImages.length;
      
      char.detailImages.forEach((imgUrl, index) => {
        const slide = document.createElement('div');
        slide.className = 'slider-slide';
        slide.innerHTML = `<img src="${imgUrl}" alt="图片${index + 1}">`;
        wrapper.appendChild(slide);
        
        const dot = document.createElement('div');
        dot.className = 'slider-dot' + (index === 0 ? ' active' : '');
        dot.addEventListener('click', () => goToSlide(index));
        dots.appendChild(dot);
      });

      // 更新角色信息
      document.getElementById('modalName').textContent = char.name;
      document.getElementById('modalSite').textContent = char.detailInfo.site;
      document.getElementById('modalSite').href = char.detailInfo.site;
      document.getElementById('modalContact').textContent = char.detailInfo.contact;

      document.getElementById('modal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // 滑动到指定页
    function goToSlide(index) {
      currentSlide = index;
      const wrapper = document.getElementById('sliderWrapper');
      wrapper.style.transform = `translateX(-${index * 100}%)`;
      
      // 更新指示器
      document.querySelectorAll('.slider-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === index);
      });
    }

    // 上一张
    document.getElementById('prevBtn').addEventListener('click', () => {
      currentSlide = (currentSlide - 1 + totalSlides) % totalSlides;
      goToSlide(currentSlide);
    });

    // 下一张
    document.getElementById('nextBtn').addEventListener('click', () => {
      currentSlide = (currentSlide + 1) % totalSlides;
      goToSlide(currentSlide);
    });

    // 关闭模态框
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
      document.body.style.overflow = '';
    }

    // 初始化
    loadCharacters();
  </script>
</body>
</html>
