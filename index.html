<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to my world</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #f7b05e;
      --bg-white: #ffffff;
      --bg-gray: #f5f5f5;
      --text-dark: #333333;
      --text-gray: #666666;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-white);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* 顶部16:9置顶图 - 循环轮播 */
    .hero-section {
      width: 100%;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* 轮播图层 */
    .hero-slides {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      animation: slideShow 15s infinite;
    }

    .hero-slides .slide {
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      flex-shrink: 0;
    }

    /* 多张背景图 */
    .hero-slides .slide:nth-child(1) { background-image: url('images/top1.jpg'); }
    .hero-slides .slide:nth-child(2) { background-image: url('images/top2.jpg'); }
    .hero-slides .slide:nth-child(3) { background-image: url('images/top3.jpg'); }

    @keyframes slideShow {
      0% { transform: translateX(0); }
      33% { transform: translateX(0); }
      40% { transform: translateX(-100%); }
      66% { transform: translateX(-100%); }
      73% { transform: translateX(-200%); }
      100% { transform: translateX(-200%); }
    }

    /* 遮罩层 */
    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      z-index: 1;
    }

    .hero-title {
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: var(--bg-white);
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
      z-index: 2;
      letter-spacing: 0.2em;
      position: relative;
      text-transform: uppercase;
    }

    /* 三大栏目 */
    .main-nav {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 3rem 1rem;
      flex-wrap: wrap;
      max-width: 1200px;
      margin: 0 auto;
    }

    .nav-item {
      position: relative;
      width: 200px;
      height: 100px;
      background: var(--bg-gray);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .nav-item:hover {
      border-color: var(--primary-color);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(247, 176, 94, 0.3);
    }

    .nav-item span {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    /* 子菜单 */
    .submenu {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-white);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      padding: 0.5rem 0;
      min-width: 160px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .nav-item:hover .submenu {
      opacity: 1;
      visibility: visible;
      margin-top: 8px;
    }

    .submenu a {
      display: block;
      padding: 0.75rem 1.5rem;
      color: var(--text-dark);
      text-decoration: none;
      transition: background 0.2s ease;
      font-size: 0.95rem;
    }

    .submenu a:hover {
      background: var(--bg-gray);
      color: var(--primary-color);
    }

    /* 个人动态没有子菜单 */
    .nav-item.blog .submenu {
      display: none;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .hero-section {
        aspect-ratio: 4 / 3;
      }

      .hero-title {
        text-align: center;
      }

      .main-nav {
        gap: 1rem;
        padding: 2rem 1rem;
        padding-top: 3rem;
      }

      .nav-item {
        width: 100%;
        max-width: 280px;
        height: 80px;
      }

      /* 子菜单在手机端 */
      .submenu {
        position: absolute;
        top: 100%;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg-white);
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        padding: 0.5rem 0;
        min-width: 160px;
        z-index: 1000;
        margin-top: 0.5rem;
      }

      /* 默认隐藏，点击/触摸时显示 */
      .nav-item .submenu {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.2s, visibility 0.2s;
      }

      .nav-item:active .submenu,
      .nav-item:focus-within .submenu {
        opacity: 1;
        visibility: visible;
      }

      /* 个人动态没有子菜单 */
      .nav-item.blog .submenu {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部置顶图 -->
  <div class="hero-section">
    <div class="hero-slides">
      <div class="slide"></div>
      <div class="slide"></div>
      <div class="slide"></div>
    </div>
    <div class="hero-overlay"></div>
    <h1 class="hero-title">Welcome!</h1>
  </div>

  <!-- 三大栏目 -->
  <nav class="main-nav">
    <div class="nav-item">
      <span>原创世界</span>
      <div class="submenu">
        <a href="avatar.html">皮套</a>
        <a href="ip.html">IP</a>
        <a href="game.html">游戏</a>
        <a href="comic.html">漫画</a>
      </div>
    </div>

    <div class="nav-item">
      <span>付费类型</span>
      <div class="submenu">
        <a href="commission.html">委托</a>
        <a href="character.html">设定</a>
      </div>
    </div>

    <div class="nav-item blog">
      <span>个人动态</span>
      <div class="submenu"></div>
      <a href="blog.html" style="position:absolute;inset:0;z-index:1;"></a>
    </div>
  </nav>

  <script>
    // 确保个人动态点击正确跳转
    document.querySelector('.nav-item.blog').addEventListener('click', function(e) {
      if (e.target.tagName !== 'A') {
        window.location.href = 'blog.html';
      }
    });
  </script>
</body>
</html>
