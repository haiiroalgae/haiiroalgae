<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to my world</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary-color: #f7b05e;
      --bg-white: #ffffff;
      --bg-gray: #f5f5f5;
      --text-dark: #333333;
      --text-gray: #666666;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-white);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* 顶部16:9置顶图 */
    .hero-section {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: linear-gradient(135deg, var(--primary-color) 0%, #e8964a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .hero-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/></svg>') center/contain no-repeat;
      opacity: 0.5;
    }

    .hero-title {
      font-size: clamp(2rem, 8vw, 4rem);
      color: var(--bg-white);
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.2);
      z-index: 1;
      letter-spacing: 0.1em;
    }

    /* 三大栏目 */
    .main-nav {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 3rem 1rem;
      flex-wrap: wrap;
      max-width: 1200px;
      margin: 0 auto;
    }

    .nav-item {
      position: relative;
      width: 200px;
      height: 100px;
      background: var(--bg-gray);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .nav-item:hover {
      border-color: var(--primary-color);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(247, 176, 94, 0.3);
    }

    .nav-item span {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    /* 子菜单 */
    .submenu {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-white);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      padding: 0.5rem 0;
      min-width: 160px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      z-index: 100;
    }

    .nav-item:hover .submenu {
      opacity: 1;
      visibility: visible;
      margin-top: 8px;
    }

    .submenu a {
      display: block;
      padding: 0.75rem 1.5rem;
      color: var(--text-dark);
      text-decoration: none;
      transition: background 0.2s ease;
      font-size: 0.95rem;
    }

    .submenu a:hover {
      background: var(--bg-gray);
      color: var(--primary-color);
    }

    /* 个人动态没有子菜单 */
    .nav-item.blog .submenu {
      display: none;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .main-nav {
        gap: 1rem;
        padding: 2rem 1rem;
      }

      .nav-item {
        width: 100%;
        max-width: 280px;
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部置顶图 -->
  <div class="hero-section">
    <h1 class="hero-title">Welcome to my world</h1>
  </div>

  <!-- 三大栏目 -->
  <nav class="main-nav">
    <div class="nav-item">
      <span>原创世界</span>
      <div class="submenu">
        <a href="avatar.html">皮套</a>
        <a href="ip.html">IP</a>
        <a href="game.html">游戏</a>
        <a href="comic.html">漫画</a>
      </div>
    </div>

    <div class="nav-item">
      <span>付费类型</span>
      <div class="submenu">
        <a href="commission.html">委托</a>
        <a href="character.html">设定</a>
      </div>
    </div>

    <div class="nav-item blog">
      <span>个人动态</span>
      <div class="submenu"></div>
      <a href="blog.html" style="position:absolute;inset:0;z-index:1;"></a>
    </div>
  </nav>

  <script>
    // 确保个人动态点击正确跳转
    document.querySelector('.nav-item.blog').addEventListener('click', function(e) {
      if (e.target.tagName !== 'A') {
        window.location.href = 'blog.html';
      }
    });
  </script>
</body>
</html>
